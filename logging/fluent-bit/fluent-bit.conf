[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name tail
    Path /logs/*.log
    Tag backend.logs
    Refresh_Interval 5

[OUTPUT]
    Name es
    Match *
    Host elasticsearch
    Port 9200
    Index backend-logs
    Suppress_Type_Name On